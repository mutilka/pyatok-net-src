<script>
  // Добавляем CSS-правило для всех элементов внутри #obj
  const style = document.createElement('style');
  style.textContent = `
    #obj > * {
      transition: opacity 0.2s;
    }
    #obj > *:hover {
      opacity: 0.6 !important;
    }
  `;
  document.head.appendChild(style);
</script>

<script>
  const objectsData = {
    'kust-1': { title: 'Нейкий куст', desc: 'Куст сирени, посажен весной 2020' },
    'garage': { title: 'Гараж', desc: 'На 2 машины, автоматические ворота' },
    'perehod': { title: 'Переход', desc: 'Крытый переход между корпусами' },
    'dom': { title: 'Дом (проектируемый)', desc: 'Площадь 200 м², планировка открыта' }
  };

  const container = document.getElementById('obj');
  if (container) {
    Array.from(container.children).forEach(el => {
      const data = objectsData[el.id];
      if (data) {
        // Добавляем <title> для браузерной подсказки
        if (data.title && !el.querySelector('title')) {
          const titleElem = document.createElementNS('http://www.w3.org/2000/svg', 'title');
          titleElem.textContent = data.title;
          el.prepend(titleElem);
        }
        // Вешаем обработчик клика (alert)
        el.addEventListener('click', (e) => {
          alert(`${data.title}\n${data.desc}`);
          e.stopPropagation();
        });
      }
    });
  }
</script>


<!-- Зум -->
<script>
    const svg = document.querySelector('svg');
    let scale = 1;
    const step = 0.1;
    const min = 0.2;
    const max = 1;

    function updateScale() {
        svg.style.transform = `scale(${scale})`;
        svg.style.transformOrigin = 'center top';
    }

    // Создаём контейнер кнопок
    const btnContainer = document.createElement('div');
    btnContainer.className = 'zoom-buttons';

    // Кнопка минус
    const btnMinus = document.createElement('button');
    btnMinus.textContent = '−';
    btnMinus.className = 'zoom-btn';
    btnMinus.onclick = () => {
        if (scale - step >= min) {
            scale -= step;
            updateScale();
        }
    };

    // Кнопка плюс
    const btnPlus = document.createElement('button');
    btnPlus.textContent = '+';
    btnPlus.className = 'zoom-btn';
    btnPlus.onclick = () => {
        if (scale + step <= max) {
            scale += step;
            updateScale();
        }
    };

    btnContainer.appendChild(btnMinus);
    btnContainer.appendChild(btnPlus);
    document.body.appendChild(btnContainer);
</script>
