<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Центрированный SVG</title>
    <style>
        /* Обнуляем отступы и задаём высоту на весь экран */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f0f0f0; /* светлый фон для наглядности */
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px; /* отступы от краёв окна */
        }

        /* Контейнер, в котором будет SVG */
        .svg-container {
            max-width: 100%;
            max-height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: white; /* белый фон под SVG */
            box-shadow: 0 0 10px rgba(0,0,0,0.1); /* лёгкая тень для красоты */
            border-radius: 8px;
            overflow: auto; /* если SVG окажется больше экрана, появится прокрутка */
        }

        /* Сам SVG: адаптивная ширина, высота автоматически подстраивается */
        svg {
            display: block;
            width: 100%;
            height: auto;
            /* можно ограничить максимальные размеры, но сохраним пропорции */
            max-width: 1200px; /* опционально */
        }

        /* Сохраняем интерактивность, если нужно */
        .map-object {
            transition: stroke 0.2s, stroke-width 0.2s;
            cursor: pointer;
            fill: rgba(0,0,0,0);
        }
        .map-object:hover {
            stroke: #ff6600;
            stroke-width: 3;
            fill: rgba(0, 152, 70, 0.3);
        }
    </style>
</head>
